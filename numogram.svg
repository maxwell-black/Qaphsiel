    <!-- Gate: mini channel + marker (teach the pattern) -->
    <line x1="8" y1="108" x2="32" y2="108" 
          stroke="var(--text-muted, #003d1a)" 
          stroke-width="1.5" stroke-dasharray="3 2"/>
    <circle cx="20" cy="108" r="7" 
            fill="#050a05" 
