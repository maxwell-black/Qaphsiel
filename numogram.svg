<svg id="numogram-svg" class="numogram" viewBox="-10 0 900 1050" width="100%" height="auto" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
    <title>CCRU Numogram</title>
    <desc>
Canonical Barker-spiral Numogram per CCRU Writings 1997-2003 (Part-8: Pandemonium).

HIGHLIGHTING PROTOCOL for app.js:
Given AQ value n, compute root = 1 + ((n-1) % 9) for n > 0, else 0.

1. Add class 'highlighting' to the root .numogram element.
2. Add class 'active' to #zone-{root}.
3. Compute syzygy twin: twin = (root === 0) ? 9 : (root === 9) ? 0 : (9 - root).
   Add 'syzygy-active' to #zone-{twin}.
   Add 'active' to #syz-{min(root,twin)}-{max(root,twin)}.
4. If root is tractor zone (1,3,5,7,9), highlight the current terminating there:
   - root=1: #current-sink, root=3: #current-warp, root=5: #current-hold,
   - root=7: #current-surge, root=9: #current-plex.
5. Time-Circuit flow (doubling mod 9): if root in [1,2,4,5,7,8], compute
   next = doublingMod9(root). Add 'flow-active' to #zone-{next}.
   Doubling: 1→2, 2→4, 4→8, 8→7, 7→5, 5→1.
6. Highlight the zone's gate: #gate-{paddedGateNumber(root)}.
   Gate numbers by zone: 0→00, 1→01, 2→03, 3→06, 4→10, 5→15, 6→21, 7→28, 8→36, 9→45.

To clear: remove 'highlighting' from root; remove 'active', 'syzygy-active', 
'flow-active' classes from all children.

SOURCE: All zone→demon, syzygy, current, and gate correspondences verified 
against CCRU Writings 1997-2003, Time Spiral Press 2015, Part-8.
    </desc>

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
        </marker>
    </defs>

    <style>
.zone-circle { fill: #050a05; stroke: var(--border-color, #007733); stroke-width: 2; transition: all 0.3s; }
.zone-label { fill: var(--primary-color, #00ff66); font-family: 'Courier New', monospace; font-weight: bold; font-size: 28px; text-anchor: middle; dominant-baseline: central; transition: fill 0.3s; pointer-events: none; }

.syzygy { stroke: var(--border-color, #007733); stroke-width: 1.5; fill: none; transition: all 0.3s; }

.current { stroke-width: 2.5; fill: none; transition: all 0.3s; }
.current.central { stroke: var(--primary-color, #00ff66); }
.current.outer { stroke: #00ffaa; }
.current-label { fill: var(--primary-color, #00ff66); font-family: 'Courier New', monospace; font-size: 14px; text-anchor: middle; }

.gate { stroke: var(--text-muted, #003d1a); stroke-width: 1; fill: none; stroke-dasharray: 4 3; opacity: 0.6; transition: all 0.3s; }
.gate-label { fill: var(--text-muted, #003d1a); font-family: 'Courier New', monospace; font-size: 12px; opacity: 0.8; text-anchor: middle; pointer-events: none; }

.region-label { fill: var(--border-color, #007733); font-family: 'Courier New', monospace; font-size: 14px; letter-spacing: 2px; text-anchor: middle; }
.title-label { fill: var(--primary-color, #00ff66); font-family: 'Courier New', monospace; font-size: 24px; font-weight: bold; text-anchor: middle; letter-spacing: 3px; }

/* ===== Highlight states — toggled by app.js ===== */

/* Primary active zone — SOLID FILL */
.zone.active .zone-circle {
    fill: var(--primary-color, #00ff66);
    stroke: #fff;
    stroke-width: 3;
    filter: drop-shadow(0 0 12px var(--primary-color, #00ff66));
}
.zone.active .zone-label { fill: #000; }

/* Syzygy twin — DARK FILL with BRIGHT RING */
.zone.syzygy-active .zone-circle {
    fill: #1a3a1a;
    stroke: var(--primary-hover, #b6ff9f);
    stroke-width: 3;
    filter: drop-shadow(0 0 6px var(--primary-color, #00ff66));
}
.zone.syzygy-active .zone-label { 
    fill: var(--primary-hover, #b6ff9f);
}

/* Time-circuit next step — HOLLOW with DASHED RING */
.zone.flow-active .zone-circle {
    fill: #050a05;
    stroke: var(--primary-hover, #b6ff9f);
    stroke-width: 3.5;
    stroke-dasharray: 4 3;
    filter: drop-shadow(0 0 8px var(--primary-hover, #b6ff9f));
}
.zone.flow-active .zone-label { 
    fill: var(--primary-hover, #b6ff9f);
}

/* Active edges */
.syzygy.active { stroke: var(--primary-hover, #b6ff9f); stroke-width: 2.5; }
.current.active { stroke: var(--primary-hover, #b6ff9f); stroke-width: 3.5; filter: drop-shadow(0 0 4px var(--primary-hover, #b6ff9f)); }
.gate.active { stroke: var(--primary-hover, #b6ff9f); opacity: 1; stroke-width: 2; stroke-dasharray: 6 3; }

/* Dim non-relevant elements when highlighting */
.numogram.highlighting .syzygy:not(.active),
.numogram.highlighting .current:not(.active),
.numogram.highlighting .gate:not(.active),
.numogram.highlighting .gate-label,
.numogram.highlighting .current-label { 
    opacity: 0.15; 
    transition: opacity 0.3s;
}

/* Override so active elements' labels stay fully visible */
.numogram.highlighting .gate.active + .gate-label,
.numogram.highlighting .current.active + .current-label { 
    opacity: 1;
}
    </style>

    <text class="title-label" x="450" y="30">NUMOGRAM</text>
    <text class="region-label" x="30" y="555" transform="rotate(-90 30,555)">TIME-CIRCUIT</text>
    <text class="region-label" x="450" y="1010">WARP</text>

    <!-- Syzygies -->
    <line class="syzygy" id="syz-0-9" x1="570" y1="120" x2="330" y2="120"/>
    <line class="syzygy" id="syz-1-8" x1="705" y1="300" x2="195" y2="300"/>
    <line class="syzygy" id="syz-2-7" x1="765" y1="555" x2="135" y2="555"/>
    <line class="syzygy" id="syz-3-6" x1="525" y1="930" x2="375" y2="930"/>
    <line class="syzygy" id="syz-4-5" x1="690" y1="780" x2="210" y2="780"/>

    <!-- Time-Circuit Envelope -->
    <path id="time-circuit-envelope" d="M 195,300 L 705,300 L 765,555 L 690,780 L 210,780 L 135,555 Z" fill="var(--primary-color, #00ff66)" opacity="0.04" stroke="none"/>

    <!-- Currents -->
    <!-- 9 -> 0 -->
    <path class="current outer" id="current-plex" d="M 330,120 Q 450,75 570,120" marker-end="url(#arrow)"/>
    <text class="current-label" x="450" y="68">Plex (Uttunul)</text>

    <!-- 8 -> 1 -->
    <path class="current central" id="current-surge" d="M 195,300 Q 450,255 705,300" marker-end="url(#arrow)"/>
    <text class="current-label" x="450" y="248">Surge (Murmur)</text>

    <!-- 7 -> 2 -->
    <path class="current central" id="current-hold" d="M 135,555 Q 450,510 765,555" marker-end="url(#arrow)"/>
    <text class="current-label" x="450" y="503">Hold (Oddubb)</text>

    <!-- 6 -> 3 -->
    <path class="current outer" id="current-warp" d="M 375,930 Q 450,885 525,930" marker-end="url(#arrow)"/>
    <text class="current-label" x="450" y="878">Warp (Djynxx)</text>

    <!-- 5 -> 4 -->
    <path class="current central" id="current-sink" d="M 210,780 Q 450,735 690,780" marker-end="url(#arrow)"/>
    <text class="current-label" x="450" y="728">Sink (Katak)</text>

    <!-- Gates -->
    <!-- gate-03: 2(765,555) -> 3(525,930) -->
    <line class="gate" id="gate-03" x1="765" y1="555" x2="525" y2="930" marker-end="url(#arrow)"/>
    <text class="gate-label" x="690" y="720">Gt-3</text>

    <!-- gate-06: 3(525,930) -> 6(375,930) -->
    <line class="gate" id="gate-06" x1="525" y1="930" x2="375" y2="930" marker-end="url(#arrow)"/>
    <text class="gate-label" x="450" y="925">Gt-6</text>

    <!-- gate-10: 4(690,780) -> 1(705,300) -->
    <line class="gate" id="gate-10" x1="690" y1="780" x2="705" y2="300" marker-end="url(#arrow)"/>
    <text class="gate-label" x="735" y="540">Gt-10</text>

    <!-- gate-15: 5(210,780) -> 6(375,930) -->
    <line class="gate" id="gate-15" x1="210" y1="780" x2="375" y2="930" marker-end="url(#arrow)"/>
    <text class="gate-label" x="275" y="855">Gt-15</text>

    <!-- gate-21: 6(375,930) -> 3(525,930) curves below -->
    <path class="gate" id="gate-21" d="M 375,930 Q 450,975 525,930" marker-end="url(#arrow)"/>
    <text class="gate-label" x="450" y="990">Gt-21</text>

    <!-- gate-28: 7(135,555) -> 1(705,300) -->
    <line class="gate" id="gate-28" x1="135" y1="555" x2="705" y2="300" marker-end="url(#arrow)"/>
    <text class="gate-label" x="345" y="375">Gt-28</text>

    <!-- gate-36: 8(195,300) -> 9(330,120) -->
    <line class="gate" id="gate-36" x1="195" y1="300" x2="330" y2="120" marker-end="url(#arrow)"/>
    <text class="gate-label" x="235" y="195">Gt-36</text>

    <!-- gate-00: self loop on 0(570,120) -->
    <path class="gate" id="gate-00" d="M 570,93 A 27,27 0 1,1 597,120" marker-end="url(#arrow)"/>
    <text class="gate-label" x="620" y="105">Gt-00</text>

    <!-- gate-01: self loop on 1(705,300) -->
    <path class="gate" id="gate-01" d="M 705,273 A 27,27 0 1,1 732,300" marker-end="url(#arrow)"/>
    <text class="gate-label" x="755" y="285">Gt-01</text>

    <!-- gate-45: self loop on 9(330,120) left arc -->
    <path class="gate" id="gate-45" d="M 330,93 A 27,27 0 1,0 303,120" marker-end="url(#arrow)"/>
    <text class="gate-label" x="280" y="105">Gt-45</text>

    <!-- Zones -->
    <g id="zone-9" class="zone">
        <circle class="zone-circle" cx="330" cy="120" r="32"/>
        <text class="zone-label" x="330" y="120">9</text>
    </g>
    <g id="zone-0" class="zone">
        <circle class="zone-circle" cx="570" cy="120" r="32"/>
        <text class="zone-label" x="570" y="120">0</text>
    </g>
    <g id="zone-8" class="zone">
        <circle class="zone-circle" cx="195" cy="300" r="32"/>
        <text class="zone-label" x="195" y="300">8</text>
    </g>
    <g id="zone-1" class="zone">
        <circle class="zone-circle" cx="705" cy="300" r="32"/>
        <text class="zone-label" x="705" y="300">1</text>
    </g>
    <g id="zone-7" class="zone">
        <circle class="zone-circle" cx="135" cy="555" r="32"/>
        <text class="zone-label" x="135" y="555">7</text>
    </g>
    <g id="zone-2" class="zone">
        <circle class="zone-circle" cx="765" cy="555" r="32"/>
        <text class="zone-label" x="765" y="555">2</text>
    </g>
    <g id="zone-5" class="zone">
        <circle class="zone-circle" cx="210" cy="780" r="32"/>
        <text class="zone-label" x="210" y="780">5</text>
    </g>
    <g id="zone-4" class="zone">
        <circle class="zone-circle" cx="690" cy="780" r="32"/>
        <text class="zone-label" x="690" y="780">4</text>
    </g>
    <g id="zone-6" class="zone">
        <circle class="zone-circle" cx="375" cy="930" r="32"/>
        <text class="zone-label" x="375" y="930">6</text>
    </g>
    <g id="zone-3" class="zone">
        <circle class="zone-circle" cx="525" cy="930" r="32"/>
        <text class="zone-label" x="525" y="930">3</text>
    </g>
</svg>