<svg id="numogram-svg" class="numogram" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 820" width="100%" height="auto" preserveAspectRatio="xMidYMid meet">
<title>CCRU Numogram</title>
<desc>
Compact Pandemonium Matrix per CCRU Writings 1997-2003 (Part-8).

HIGHLIGHTING PROTOCOL for app.js:
Given AQ value n, compute root = 1 + ((n-1) % 9) for n > 0, else 0.

1. Add class 'highlighting' to the root .numogram element.
2. Add class 'active' to #zone-{root}.
3. Syzygy twin: twin = (root===0) ? 9 : (root===9) ? 0 : (9-root).
   Add 'syzygy-active' to #zone-{twin}.
   Add 'active' to #syz-{min}-{max}.
4. Tractor current (if root in {1,3,5,7,9}):
   root=1: #current-sink, root=3: #current-warp, root=5: #current-hold,
   root=7: #current-surge, root=9: #current-plex.
5. Time-Circuit flow (if root in {1,2,4,5,7,8}): add 'flow-active' to #zone-{next}
   where doubling: 1→2, 2→4, 4→8, 8→7, 7→5, 5→1.
6. Gate: add 'active' to #gate-{paddedGateNumber(root)}.
   0→00, 1→01, 2→03, 3→06, 4→10, 5→15, 6→21, 7→28, 8→36, 9→45.
   Note: class goes on the outer &lt;g id="gate-NN"&gt;; CSS targets
   descendants via .gate-group.active .gate-channel etc.

SOURCE: CCRU Writings 1997-2003, Time Spiral Press 2015, Part-8.
</desc>
<defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" 
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M0,0 L10,5 L0,10 z" fill="context-stroke"/>
    </marker>
</defs>
<style>
.zone-circle { 
    fill: #050a05; 
    stroke: var(--border-color, #007733); 
    stroke-width: 2.5; 
    transition: all 0.3s; 
}
.zone-label { 
    fill: var(--primary-color, #00ff66); 
    font-family: 'Courier New', monospace; 
    font-weight: 900; 
    font-size: 36px; 
    text-anchor: middle; 
    dominant-baseline: central; 
    transition: fill 0.3s; 
    pointer-events: none; 
}

.syzygy { 
    stroke: var(--border-color, #007733); 
    stroke-width: 1.5; 
    fill: none; 
    transition: all 0.3s; 
}

.current { 
    stroke-width: 3; 
    fill: none; 
    transition: all 0.3s; 
}
.current.central { stroke: var(--primary-color, #00ff66); }
.current.outer { stroke: #00ffaa; }
.current-label { 
    fill: var(--primary-color, #00ff66); 
    font-family: 'Courier New', monospace; 
    font-size: 16px; 
    font-weight: bold; 
    text-anchor: middle; 
    letter-spacing: 2px; 
}

.gate-channel { 
    stroke: var(--text-muted, #003d1a); 
    stroke-width: 1.5; 
    fill: none; 
    stroke-dasharray: 4 3; 
    opacity: 0.7; 
    transition: all 0.3s; 
}
.gate-marker { 
    fill: #050a05; 
    stroke: var(--primary-color, #00ff66); 
    stroke-width: 1.5; 
    opacity: 0.85; 
    transition: all 0.3s; 
}
.gate-label { 
    fill: var(--primary-color, #00ff66); 
    font-family: 'Courier New', monospace; 
    font-size: 13px; 
    font-weight: bold; 
    text-anchor: middle; 
    dominant-baseline: central; 
    pointer-events: none; 
    transition: fill 0.3s;
}

.legend-text { 
    fill: var(--primary-color, #00ff66); 
    font-family: 'Courier New', monospace; 
    font-size: 11px; 
    dominant-baseline: central; 
}
.legend-header { 
    fill: var(--primary-hover, #b6ff9f); 
    font-family: 'Courier New', monospace; 
    font-size: 12px; 
    font-weight: bold; 
    letter-spacing: 2px; 
}

/* ===== Highlight states — toggled by app.js ===== */

/* Primary active zone — SOLID FILL */
.zone.active .zone-circle {
    fill: var(--primary-color, #00ff66);
    stroke: #fff;
    stroke-width: 3.5;
    filter: drop-shadow(0 0 14px var(--primary-color, #00ff66));
}
.zone.active .zone-label { fill: #000; }

/* Syzygy twin — DARK FILL with BRIGHT RING */
.zone.syzygy-active .zone-circle {
    fill: #1a3a1a;
    stroke: var(--primary-hover, #b6ff9f);
    stroke-width: 3.5;
    filter: drop-shadow(0 0 8px var(--primary-color, #00ff66));
}
.zone.syzygy-active .zone-label { fill: var(--primary-hover, #b6ff9f); }

/* Time-circuit next step — HOLLOW with DASHED RING */
.zone.flow-active .zone-circle {
    fill: #050a05;
    stroke: var(--primary-hover, #b6ff9f);
    stroke-width: 4;
    stroke-dasharray: 4 3;
    filter: drop-shadow(0 0 10px var(--primary-hover, #b6ff9f));
}
.zone.flow-active .zone-label { fill: var(--primary-hover, #b6ff9f); }

/* Active syzygies and currents */
.syzygy.active { 
    stroke: var(--primary-hover, #b6ff9f); 
    stroke-width: 3; 
}
.current.active { 
    stroke: var(--primary-hover, #b6ff9f); 
    stroke-width: 4; 
    filter: drop-shadow(0 0 6px var(--primary-hover, #b6ff9f)); 
}

/* Active gate: the class is on the outer .gate-group; target its descendants */
.gate-group.active .gate-channel { 
    stroke: var(--primary-hover, #b6ff9f); 
    opacity: 1; 
    stroke-width: 2.5; 
    stroke-dasharray: 6 3; 
}
.gate-group.active .gate-marker { 
    stroke: var(--primary-hover, #b6ff9f); 
    stroke-width: 2.5; 
    opacity: 1; 
    filter: drop-shadow(0 0 4px var(--primary-hover, #b6ff9f)); 
}
.gate-group.active .gate-label { 
    fill: var(--primary-hover, #b6ff9f); 
}

/* Dim non-relevant elements when highlighting */
.numogram.highlighting .syzygy:not(.active),
.numogram.highlighting .current:not(.active),
.numogram.highlighting .gate-group:not(.active),
.numogram.highlighting .current-label { 
    opacity: 0.2; 
    transition: opacity 0.3s; 
}

/* Active current's label stays fully visible (adjacent sibling) */
.numogram.highlighting .current.active + .current-label { 
    opacity: 1; 
}
</style>
