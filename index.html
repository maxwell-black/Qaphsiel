<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qaphsiel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=13">
</head>
<body>
    <div id="loadingOverlay">
        <div class="spinner"></div>
        <p id="loadingText">Loading Holy Text...</p>
    </div>

    <div class="container">
        <header class="app-header">
            <h1>Qaphsiel</h1>
            <p class="subtitle">Alphanumeric Qabbala Research Tool</p>
        </header>

        <main class="main-content">
            <section class="search-section card">
                <div class="search-tabs">
                    <button class="tab-btn active" data-tab="text-search">Text Search</button>
                    <button class="tab-btn" data-tab="number-search">Number Search</button>
                    <button class="tab-btn" data-tab="sigil-generator">Sigil Generator</button>
                    <button class="tab-btn" data-tab="xenotation">Xenotation</button>
                </div>

                <div class="tab-content active" id="text-search">
                    <div class="form-group" style="margin-bottom: 1.5rem;">
                        <label for="searchInput">Enter Text to Calculate & Search:</label>
                        <div class="input-action">
                            <input type="text" id="searchInput" placeholder="e.g. In the beginning..." />
                            <button type="button" id="searchButton" class="btn primary">Search</button>
                        </div>
                    </div>

                    <details class="advanced-options">
                        <summary>Advanced Search Options</summary>
                        <div class="options-grid">
                            <div class="form-group">
                                <label for="maxWords">Max phrase length:</label>
                                <input type="number" id="maxWords" value="10" min="1" max="50" />
                            </div>
                            <div class="form-group">
                                <label for="phraseScope">Phrase scope:</label>
                                <select id="phraseScope">
                                    <option value="within" selected>Within verse only</option>
                                    <option value="cross">Allow crossing verses</option>
                                </select>
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--primary-hover);">
                                    <input type="checkbox" id="oedipusFilter" style="flex: none; width: auto;" />
                                    Enable Oedipus/Meat Subtraction (Strips humanistic/divine stop-words)
                                </label>
                            </div>
                            <div class="form-group" style="grid-column: 1 / -1;">
                                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; color: var(--primary-hover);">
                                    <input type="checkbox" id="hyperprimeFilter" style="flex: none; width: auto;" />
                                    Enable Hyperprime Resonance (Barker Filter)
                                </label>
                            </div>
                        </div>
                    </details>
                </div>

                <div class="tab-content" id="number-search">
                    <div class="form-group">
                        <label for="numericInput">Search directly by AQ value:</label>
                        <div class="input-action">
                            <input type="text" id="numericInput" placeholder="e.g. 489" />
                            <button type="button" id="numericSearchButton" class="btn primary">Search AQ</button>
                        </div>
                    </div>
                </div>

                <div class="tab-content" id="sigil-generator">
                    <div class="sigil-panel">
                        <div class="form-group">
                            <label for="aqSquareInput">Enter Word/Phrase for Sigil:</label>
                            <input type="text" id="aqSquareInput" placeholder="Draw a sigil..." />
                        </div>
                        <div class="sigil-display">
                            <div id="aqSquareGrid" class="aq-grid"></div>
                            <svg id="aqSquareSvg" width="240" height="240"></svg>
                        </div>
                        <p class="sigil-help">The sigil is traced on a 6x6 alphanumeric grid (0-9, A-Z).</p>
                    </div>
                </div>

                <div class="tab-content" id="xenotation">
                    <div class="form-group">
                        <label for="xenoInput">Reverse Xenotation (Input TX, e.g. ((•))(•)):</label>
                        <div class="input-action">
                            <input type="text" id="xenoInput" placeholder="Use • or : and ()" />
                            <button type="button" id="xenoSearchButton" class="btn primary">Compile & Search</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="resultsSection" class="results-section" style="display: none;">
                <div id="stats"></div>

                <div id="paginationTop" class="pagination">
                    <button id="prevPage" class="btn outline" disabled>← Previous</button>
                    <span id="pageInfo" class="page-info"></span>
                    <button id="nextPage" class="btn outline" disabled>Next →</button>
                </div>

                <div id="results" class="results-list"></div>

                <div id="paginationBottom" class="pagination">
                    <button id="prevPageBottom" class="btn outline" disabled>← Previous</button>
                    <span id="pageInfoBottom" class="page-info"></span>
                    <button id="nextPageBottom" class="btn outline" disabled>Next →</button>
                </div>
            </section>
        </main>

        <footer>
            <p>Qaphsiel &middot; KJV Text</p>
        </footer>
        </div>
        <script src="numogram.js?v=1"></script>
        <script src="app.js?v=16"></script>
        </body></html>     </body>
</html>
